name: Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set release parameters
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "TAG_NAME=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=latest" >> "$GITHUB_ENV"
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          fi

      - name: Download release APK artifact
        uses: actions/download-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/

      - name: Resolve release APK input
        run: |
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "RELEASE_APK_INPUT=app/build/outputs/apk/release/app-release-unsigned.apk" >> "$GITHUB_ENV"
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "RELEASE_APK_INPUT=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"
          else
            echo "No release APK found after artifact download."
            ls -la app/build/outputs/apk/release || true
            exit 1
          fi

      - name: Validate signing requirements
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$HAS_KEYSTORE" != "true" ]; then
            echo "A keystore is required for stable tag releases to avoid publishing a non-installable APK."
            exit 1
          fi

      - name: Create temporary keystore for pre-release signing
        if: ${{ env.HAS_KEYSTORE != 'true' }}
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/release.jks \
            -storepass android \
            -alias ci-release \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=CI Release, OU=Automation, O=USBIPServerForAndroid, L=Remote, ST=Remote, C=US"

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.jks
            KS_PASS="$KEYSTORE_PASSWORD"
            KS_ALIAS="$KEY_ALIAS"
            KEY_PASS="$KEY_PASSWORD"
          else
            KS_PASS="android"
            KS_ALIAS="ci-release"
            KEY_PASS="android"
          fi

          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner sign \
            --ks /tmp/release.jks \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KEY_PASS" \
            --ks-key-alias "$KS_ALIAS" \
            --out app/build/outputs/apk/release/app-release.apk \
            "$RELEASE_APK_INPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          prerelease: ${{ env.PRERELEASE }}
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
